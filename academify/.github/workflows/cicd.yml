name: Academify CI/CD

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "README.md"
      - "API_DOCS.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

# =========================================================================
#  JOB 1 – Quality gate: lint + unit tests
# =========================================================================
jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?sslmode=disable
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?sslmode=disable
          BETTER_AUTH_SECRET: ci-build-placeholder-not-used-at-runtime
        run: npm run build

      - name: Test (with coverage log)
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?sslmode=disable
        run: npm run test:coverage -- --verbose --ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: coverage/
          retention-days: 7

  # =========================================================================
  #  JOB 1b – Integration tests (real PostgreSQL)
  # =========================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: academify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d academify_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma migrate (test database)
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/academify_test?sslmode=disable
          DIRECT_URL: postgresql://ci:ci@localhost:5432/academify_test?sslmode=disable
        run: npx prisma migrate deploy

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgresql://ci:ci@localhost:5432/academify_test?sslmode=disable
          DATABASE_URL: postgresql://ci:ci@localhost:5432/academify_test?sslmode=disable
          DIRECT_URL: postgresql://ci:ci@localhost:5432/academify_test?sslmode=disable
        run: npm run test:integration

  # =========================================================================
  #  JOB 2 – Build Docker image and push to Docker Hub
  # =========================================================================
  build:
    name: Build & Push Image
    needs: [quality, integration]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push App Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/academify:latest
          target: runner
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/academify:latest
          cache-to: type=inline
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_API_DOCS_ENABLED=${{ secrets.NEXT_PUBLIC_API_DOCS_ENABLED }}
            NEXT_PUBLIC_BETTER_AUTH_URL=${{ secrets.NEXT_PUBLIC_BETTER_AUTH_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}

      - name: Build and Push Socket Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/academify-socket:latest
          target: socket
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/academify-socket:latest
          cache-to: type=inline

      - name: Build and Push DB Migrator Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/academify-migrator:latest
          target: migrator
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/academify-migrator:latest
          cache-to: type=inline

  # =========================================================================
  #  JOB 3 – Deploy to VPS via self-hosted GitHub Actions runner
  # =========================================================================
  deploy:
    name: Deploy to Server
    needs: build
    runs-on: self-hosted
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Reconstruct .env.production on the runner from GitHub Secrets.
      # This file is ephemeral — deleted at the end of this job.
      - name: Create .env.production from GitHub Secrets
        run: |
          cat > .env.production <<EOF
          NODE_ENV=production
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_API_DOCS_ENABLED=${{ secrets.NEXT_PUBLIC_API_DOCS_ENABLED }}
          NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}

          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DIRECT_URL=${{ secrets.DIRECT_URL }}

          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
          NEXT_PUBLIC_BETTER_AUTH_URL=${{ secrets.NEXT_PUBLIC_BETTER_AUTH_URL }}

          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}

          NEXT_PUBLIC_MINIO=${{ secrets.NEXT_PUBLIC_MINIO }}
          MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}
          MINIO_PUBLIC_ENDPOINT=${{ secrets.MINIO_PUBLIC_ENDPOINT }}
          MINIO_REGION=${{ secrets.MINIO_REGION }}
          MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}
          MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
          MINIO_FORCE_PATH_STYLE=${{ secrets.MINIO_FORCE_PATH_STYLE }}

          OLLAMA_API_BASE=${{ secrets.OLLAMA_API_BASE }}
          OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL }}
          OLLAMA_TIMEOUT_MS=${{ secrets.OLLAMA_TIMEOUT_MS }}
          SOCKET_SERVER_URL=http://socket:3100
          SOCKET_EMIT_SECRET=${{ secrets.SOCKET_EMIT_SECRET }}
          EOF

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies for DB migration
        run: npm ci

      # Run migrations on the host (avoids Docker shim v3 errors on older VPS daemons).
      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma migrate deploy

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest images
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/academify:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/academify-socket:latest

      - name: Deploy stack
        run: |
          docker compose --env-file .env.production pull app socket
          docker compose --env-file .env.production up -d app socket minio

      - name: Remove .env.production
        if: always()
        run: rm -f .env.production

      - name: Cleanup dangling images
        run: docker image prune -f
